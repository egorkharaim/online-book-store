version: '3.8'

services:
  mysqldb:
    image: mysql:8.0.33
    container_name: mysqldb
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${MYSQLDB_DATABASE}
      MYSQL_USER: ${MYSQLDB_USER}
      MYSQL_PASSWORD: ${MYSQLDB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQLDB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: online-book-store-app
    restart: on-failure
    depends_on:
      - mysqldb
    ports:
      - "${SPRING_LOCAL_PORT}:8080"
      - "${DEBUG_PORT}:5005"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${MYSQLDB_HOST}:${MYSQLDB_PORT}/${MYSQLDB_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQLDB_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQLDB_PASSWORD}

volumes:
  mysql_data:
  